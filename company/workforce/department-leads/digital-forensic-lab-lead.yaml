- production_access
- spending
- secrets_reading
- deployment_tools
- external_webhooks
- browser_posting
- social_media_api
- network_scanners
allowed_data:
- synthetic_data
- public_sources
- approved_internal_knowledge_notes
- redacted_training_examples
forbidden_data:
- secrets
- production_data
- customer_data
- real_employee_personal_data
- real_victim_or_case_data
- identifiable_person_data
- private_keys
- tokens
autonomy_level: L1
risk_tier: T2
approval_gate: kei_plus_qualified_human_review
receipt_required: true
activation_requirements:
- gate_0_need_to_role
- gate_1_manifest
- gate_2_safety
- gate_3_validator
- gate_4_probation
