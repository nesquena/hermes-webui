first_3_probation_tasks:
- run synthetic chain-of-custody dry run
- validate synthetic evidence register fixture
- run red-line failure drill
metrics:
- custody_gap_detected_count
- unsupported_claim_blocked_count
- policy_violation_count
- receipt_completeness
- reviewer_burden_minutes
