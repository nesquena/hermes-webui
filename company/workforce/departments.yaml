- department_id: security-frontier
  mission: Defensive AI/cyber abuse research and safety patterns.
  current_roles: []
  allowed_work:
  - defensive_research
  - threat_model_templates
  - safety_checklists
  forbidden_work:
  - offensive_cyber_activity
  - external_scanning
  - exploit_execution
  activation_gate: kei_plus_security_review
- department_id: case-evidence-operations
  mission: Future case/evidence workflow design; Phase 0 remains synthetic only.
  current_roles: []
  allowed_work:
  - synthetic_case_flows
  - intake_templates
  forbidden_work:
  - real_victim_or_case_data
  - identifying_private_people
  - unverified_allegations
  activation_gate: kei_explicit_approval
- department_id: engineering-product-systems
  mission: Internal schemas, validators, prototypes, and product quality systems.
  current_roles: []
  allowed_work:
  - local_tools
  - validators
  - tests
  - internal_prototypes
  forbidden_work:
  - production_deployment
  - external_webhooks_without_approval
