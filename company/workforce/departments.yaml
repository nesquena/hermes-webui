departments:
- department_id: executive-control
  mission: Route work, enforce approval gates, synthesize decisions, and keep Kei
    as final authority.
  current_roles:
  - yuto-control
  allowed_work:
  - intake
  - routing
  - verification
  - internal_decisions
  forbidden_work:
  - external_representation_without_approval
  - production_changes_without_approval
  activation_gate: kei_or_yuto_control
- department_id: hr-people-ops
  mission: Design and govern workforce objects, role lifecycle, onboarding, receipts,
    and pruning.
  current_roles:
  - chief-of-staff-org-architect
  - hr-role-designer
  - culture-safety-steward
  allowed_work:
  - role_design
  - personnel_templates
  - internal_probation_receipts
  forbidden_work:
  - employment_decisions
  - real_employee_sensitive_data
  activation_gate: yuto-control
- department_id: global-intelligence
  mission: Read-only monitoring and signal collection for AI harm/company context.
  current_roles: []
  allowed_work:
  - read_only_monitoring_plans
  - source_lists
  - signal_taxonomy
  forbidden_work:
  - external_outreach
  - covert_collection
  - personal_data_collection
  activation_gate: compliance-safety-expert-network
- department_id: research-policy
  mission: Source-backed research synthesis and policy notes.
  current_roles: []
  allowed_work:
  - research_briefs
  - source_trails
  - policy_question_lists
  forbidden_work:
  - final_policy_claims
  - legal_advice
  activation_gate: compliance-safety-expert-network
- department_id: ai-law-legal-frontier
  mission: Legal-tech and AI law frontier research for qualified human review.
  current_roles: []
  allowed_work:
  - issue_spotting
  - legal_research_questions
  - source_summaries
  forbidden_work:
  - legal_advice
  - final_legal_claims
  - client_representation
  activation_gate: kei_plus_qualified_human_review
- department_id: digital-forensic-lab
