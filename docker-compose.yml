version: "3.8"

services:
  hermes-webui:
    build: .
    ports:
      - "8787:8787"
    volumes:
      # Workspace: files you work on (browse, edit, create).
      # Separate from config — keeps your data independent of the container.
      - ${HERMES_WORKSPACE:-${HOME}/workspace}:/workspace
      # State: sessions, settings, and other runtime state.
      # Persists across container restarts. Override on host with HERMES_WEBUI_STATE.
      - ${HERMES_WEBUI_STATE:-${HOME}/.hermes-webui/state}:/home/hermeswebui/.hermes/webui
    environment:
      # Set to your host user ID: run `id -u` and `id -g` to find them.
      # On macOS, UIDs start at 501 (not 1000), so set UID and GID in a .env file:
      #   echo "UID=$(id -u)" >> .env
      #   echo "GID=$(id -g)" >> .env
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
    restart: unless-stopped
