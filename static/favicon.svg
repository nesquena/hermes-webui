<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="neo-favicon-title neo-favicon-desc">
  <title id="neo-favicon-title">Neo favicon</title>
  <desc id="neo-favicon-desc">Cyan Neo WebUI icon.</desc>
  <defs>
    <radialGradient id="neo-favicon-bg" cx="48%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#5EE9FF"/>
      <stop offset="52%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#04101A"/>
    </radialGradient>
    <filter id="neo-favicon-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#04101A"/>
  <circle cx="32" cy="32" r="25" fill="url(#neo-favicon-bg)" opacity="0.32" filter="url(#neo-favicon-glow)"/>
  <path d="M32 8c9 0 16 7 16 16 0 7-4 13-10 15 10 2 17 8 21 18H5c4-10 11-16 21-18-6-2-10-8-10-15 0-9 7-16 16-16z" fill="none" stroke="#00E5FF" stroke-width="2.2" filter="url(#neo-favicon-glow)"/>
  <path d="M32 9 23 24l9 13 9-13zm-9 15-5 15 14-2 14 2-5-15M16 54l16-17 16 17M32 37v16" fill="none" stroke="#B8F7FF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="32" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="#E8FBFF" letter-spacing="1">NEO</text>
</svg>
