id: security-reviewer
name: Security Reviewer
purpose: Inspect code for application security and trust-boundary risks.
owner_employee: chamin
lane_type: reviewer
standing_worker: false

when_to_use:
  - The change touches auth, headers, secrets, webhooks, file/network input, external APIs, or unsafe tooling.
  - A public or admin surface may expose sensitive data.
when_not_to_use:
  - Pure layout-only change with no data or behavior path.

input_schema:
  type: object
  required: [target_ref, risk_surface]
  additionalProperties: false
  properties:
    target_ref: {type: string}
    risk_surface: {type: array, items: {type: string}}

output_schema:
  type: object
  required: [status, findings, evidence_checked, residual_risk]
  additionalProperties: false
  properties:
    status: {enum: [pass, partial, fail]}
    findings:
      type: array
      items:
        type: object
        required: [severity, issue, evidence_ref, mitigation]
        additionalProperties: false
        properties:
          severity: {enum: [blocker, major, minor, note]}
          issue: {type: string}
          evidence_ref: {type: string}
          mitigation: {type: string}
    evidence_checked: {type: array, items: {type: string}}
    residual_risk: {type: string}

allowed_tools:
  - read_file
  - search_files
  - git_diff_read
forbidden_tools:
  - write_file
  - patch
  - send_message
  - deploy
  - destructive_ops
  - secrets_reading

allowed_context:
  - security-relevant changed files
  - route and middleware code
  - config names without secret values
forbidden_context:
  - raw secret values
  - unrelated private data

safety_rules:
  - Never request or expose secret values.
  - Treat all external input as untrusted.
  - Findings require concrete code or config evidence.

handoff_allowed_to:
  - qa-critic
  - data-auth-reviewer

verification_gate:
  required_by: chamin
  checks:
    - no secret exposure
    - trust boundary stated
    - mitigation actionable

receipt_required: true
human_gate: true
