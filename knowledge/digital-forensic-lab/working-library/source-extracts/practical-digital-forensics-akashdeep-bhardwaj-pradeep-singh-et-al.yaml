framework_questions:
- Which OS artifact is being simulated and what is the preservation boundary?
- What command or tool concept must remain sandbox-only?
- What evidence register field proves the drill did not use real user data?
reusable_rules:
- Only run commands against toy files or generated sandbox data.
- Document OS, artifact type, hash placeholder, and custody event for every drill.
- Do not inspect real user directories, browser data, credentials, or production logs.
