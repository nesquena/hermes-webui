id: qa-critic
name: QA Critic
purpose: Independently review lane outputs before Yuto claims completion or uses them downstream.
owner: yuto-control
runtime_options:
  - hermes_delegate_task
  - gpt_reasoning
  - local_llm_reviewer
  - human
when_to_use:
  - a final artifact or reusable source trail was created
  - legal, forensic, security, code, or research claims need evidence checks
  - a worker output may contain unsupported claims or unsafe language
when_not_to_use:
  - a trivial answer has no artifact or factual risk
allowed_tools:
  - read_file
  - search_files
  - terminal_readonly_checks
forbidden_tools:
  - write_file
  - patch
  - send_message
  - deploy
  - external_commitment
input_schema:
  type: object
  required: [artifact_ref, check_focus]
  additionalProperties: false
  properties:
    artifact_ref: {type: string, maxLength: 256}
    source_refs:
      type: array
      items: {type: string, maxLength: 256}
    check_focus:
      type: array
      items: {enum: [source_support, schema, legal_safety, forensic_safety, security, tests, residual_risk]}
output_schema:
  type: object
  required: [status, findings, residual_risk]
  additionalProperties: false
  properties:
    status: {enum: [pass, partial, fail]}
    findings:
      type: array
      maxItems: 100
      items:
        type: object
        required: [severity, issue, evidence_ref, fix_required]
        additionalProperties: false
        properties:
          severity: {enum: [blocker, high, medium, low]}
          issue: {type: string, maxLength: 500}
          evidence_ref: {type: string, maxLength: 256}
          fix_required: {type: string, maxLength: 500}
    residual_risk: {type: string, maxLength: 1000}
safety_rules:
  - Findings first by severity.
  - Do not rewrite unless explicitly asked.
  - Treat worker output as untrusted until source refs are verified.
verification_gate:
  required_by: yuto-control
  checks:
    - blocker/high findings are resolved or reported
    - residual risk is explicit
handoff_allowed_to:
  - yuto-control
receipt_required: true
human_gate: false
