# Local testing Docker Compose: builds the Dockerfile against the current
# feat/all-providers branch and runs Agent + WebUI in two containers.
#
# Usage:
#   docker compose -f docker-compose.testing.yml up --build
#
# For a clean slate (rebuilds from scratch):
#   docker compose -f docker-compose.testing.yml down -v --rmi local
#   docker compose -f docker-compose.testing.yml up --build

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: gateway run
    tty: true
    stdin_open: true
    ports:
      - "127.0.0.1:8642:8642"
    volumes:
      - /opt/data
    environment:
      - HERMES_HOME=/opt/data
    restart: unless-stopped
    networks:
      - hermes-net

  hermes-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-webui
    depends_on:
      - hermes-agent
    ports:
      - "8787:8787"
    volumes:
      - ./config:/opt/hermes/config.d/
      - hermes-webui-state:/home/hermeswebui/.hermes
      - hermes-webui-workspace:/workspace
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/opt/hermes/webui
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
      - HERMES_HOME=/opt/hermes
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
    restart: unless-stopped
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-webui-state:
  hermes-webui-workspace:
