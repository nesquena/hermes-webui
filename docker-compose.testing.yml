# Local testing Docker Compose: builds the Dockerfile against the current
# feat/all-providers branch and runs Agent + WebUI in two containers.
#
# Usage:
#   docker compose -f docker-compose.testing.yml up --build
#
# For a clean slate (rebuilds from scratch):
#   docker compose -f docker-compose.testing.yml down -v --rmi local
#   docker compose -f docker-compose.testing.yml up --build

services:
  hermes-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-webui
    ports:
      - "8787:8787"
    volumes:
      # Mount hermes-agent source (read-only) for AIAgent imports.
      - /var/home/yoav/hermes-agent:/opt/hermes-agent:ro
      # Workspace directory — browse and edit files from the WebUI.
      # Adapt the host path to your project directory.
      - /var/home/yoav/workspace:/workspace
      # Bind-mount config.yaml and .env from the host for easy editing without entering the container.
      # Create these next to your docker-compose.yml (or adjust the host paths).
      - /home/yoav/.hermes/config.yaml:/home/hermeswebui/.hermes/config.yaml:ro
      - /home/yoav/.hermes/.env:/home/hermeswebui/.hermes/.env:ro
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/opt/hermes/webui-mvp
      - HERMES_WEBUI_AGENT_DIR=/opt/hermes-agent
      # Match your host user's UID/GID for correct file permissions.
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
      # Optional: set a password for remote access
      # - HERMES_WEBUI_PASSWORD=your-s...word
    restart: unless-stopped
